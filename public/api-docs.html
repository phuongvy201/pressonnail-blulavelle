<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>API Documentation</title>
        <link
            rel="stylesheet"
            type="text/css"
            href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css"
        />
        <style>
            body {
                margin: 0;
                padding: 0;
            }
            .topbar {
                display: none;
            }
            .api-doc-intro {
                font-family: system-ui, -apple-system, Segoe UI, sans-serif;
                padding: 1rem 1.25rem;
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
                color: #334155;
                font-size: 0.95rem;
                line-height: 1.5;
            }
            .api-doc-intro a {
                color: #0f766e;
            }
            .api-doc-intro code {
                background: #e2e8f0;
                padding: 0.1rem 0.35rem;
                border-radius: 4px;
                font-size: 0.88em;
            }
        </style>
    </head>
    <body>
        <div class="api-doc-intro">
            Public storefront API — no API token. Query parameters use <strong>camelCase</strong> where noted.
            Auth / cart / checkout: session cookies, <code>credentials: 'include'</code>, JSON with <code>Content-Type: application/json</code>, and <code>X-CSRF-TOKEN</code> on POST/PUT/DELETE.
            <a href="/admin/api-token">API Token Dashboard</a>
        </div>
        <div id="swagger-ui"></div>

        <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
        <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
        <script>
            window.onload = function () {
                const spec = {
                    openapi: "3.0.0",
                    info: {
                        title: "Press On Nail API",
                        description:
                            "Storefront JSON API. **Auth (session):** register/login → cookie + CSRF. **Account:** `GET /api/profile`, `GET /api/orders` (login required). **Checkout:** Cart → checkout → `POST /checkout/process`.",
                        version: "2.11.0",
                    },
                    servers: [
                        {
                            url: window.location.origin,
                            description: "Current server",
                        },
                    ],
                    paths: {
                        "/api/auth/register": {
                            post: {
                                tags: ["Auth"],
                                summary: "Register",
                                description:
                                    "Create a new customer account and start a session (auto login). Same rules as web register. If reCAPTCHA is enabled on the site, send `recaptchaToken`. Use `credentials: 'include'` and `X-CSRF-TOKEN`.",
                                operationId: "authRegister",
                                security: [],
                                requestBody: {
                                    required: true,
                                    content: {
                                        "application/json": {
                                            schema: {
                                                $ref: "#/components/schemas/AuthRegisterRequest",
                                            },
                                        },
                                    },
                                },
                                responses: {
                                    200: {
                                        description: "Registered and logged in",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthRegisterResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description: "Validation error (email taken, weak password, captcha, etc.)",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                    429: {
                                        description: "Too many registration attempts",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/auth/login": {
                            post: {
                                tags: ["Auth"],
                                summary: "Login",
                                description:
                                    "Authenticate with email and password. Creates a **session cookie** (same as the web storefront). Send `X-CSRF-TOKEN` from the site `<meta name=\"csrf-token\">` before POST. Use `credentials: 'include'` in fetch.",
                                operationId: "authLogin",
                                security: [],
                                requestBody: {
                                    required: true,
                                    content: {
                                        "application/json": {
                                            schema: {
                                                $ref: "#/components/schemas/AuthLoginRequest",
                                            },
                                        },
                                    },
                                },
                                responses: {
                                    200: {
                                        description: "Logged in",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthLoginResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description: "Validation error (invalid email/password or rate limit)",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                    429: {
                                        description: "Too many login attempts",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/auth/logout": {
                            post: {
                                tags: ["Auth"],
                                summary: "Logout",
                                description:
                                    "Ends the session. Requires session cookie and `X-CSRF-TOKEN`.",
                                operationId: "authLogout",
                                security: [{ cookieAuth: [] }],
                                responses: {
                                    200: {
                                        description: "Logged out",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthLogoutResponse",
                                                },
                                            },
                                        },
                                    },
                                    401: {
                                        description: "Not authenticated",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthErrorResponse",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/auth/user": {
                            get: {
                                tags: ["Auth"],
                                summary: "Current user",
                                description:
                                    "Returns the logged-in user or `authenticated: false` when guest. Optional session cookie.",
                                operationId: "authUser",
                                security: [],
                                responses: {
                                    200: {
                                        description: "Session state",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthUserResponse",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/profile": {
                            get: {
                                tags: ["Profile"],
                                summary: "Get profile",
                                description:
                                    "Customer profile and account stats. Requires login (`POST /api/auth/login`) and session cookie with `credentials: 'include'`.",
                                operationId: "getProfile",
                                security: [{ cookieAuth: [] }],
                                responses: {
                                    200: {
                                        description: "Profile",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ProfileResponse",
                                                },
                                            },
                                        },
                                    },
                                    401: {
                                        description: "Not authenticated",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthErrorResponse",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/orders": {
                            get: {
                                tags: ["Orders"],
                                summary: "List orders",
                                description:
                                    "Paginated order history for the logged-in customer. Optional filters `status`, `search`. Includes `stats` counts by status.",
                                operationId: "listOrders",
                                security: [{ cookieAuth: [] }],
                                parameters: [
                                    {
                                        name: "page",
                                        in: "query",
                                        schema: { type: "integer", default: 1, minimum: 1 },
                                    },
                                    {
                                        name: "perPage",
                                        in: "query",
                                        schema: {
                                            type: "integer",
                                            default: 10,
                                            minimum: 1,
                                            maximum: 50,
                                        },
                                    },
                                    {
                                        name: "status",
                                        in: "query",
                                        description: "Filter: pending, processing, completed, cancelled",
                                        schema: {
                                            type: "string",
                                            enum: [
                                                "pending",
                                                "processing",
                                                "completed",
                                                "cancelled",
                                            ],
                                        },
                                    },
                                    {
                                        name: "search",
                                        in: "query",
                                        description: "Search order number, name, or email",
                                        schema: { type: "string" },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Order list",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/OrderListResponse",
                                                },
                                            },
                                        },
                                    },
                                    401: {
                                        description: "Not authenticated",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthErrorResponse",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/orders/{orderNumber}": {
                            get: {
                                tags: ["Orders"],
                                summary: "Get order detail",
                                description:
                                    "Full order by `orderNumber` (e.g. `ORD-20250101-0001`). Only orders owned by the logged-in user.",
                                operationId: "getOrder",
                                security: [{ cookieAuth: [] }],
                                parameters: [
                                    {
                                        name: "orderNumber",
                                        in: "path",
                                        required: true,
                                        schema: { type: "string", example: "ORD-20250101-0001" },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Order detail",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/OrderDetailResponse",
                                                },
                                            },
                                        },
                                    },
                                    401: {
                                        description: "Not authenticated",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/AuthErrorResponse",
                                                },
                                            },
                                        },
                                    },
                                    404: {
                                        description: "Order not found",
                                    },
                                },
                            },
                        },
                        "/api/products": {
                            get: {
                                tags: ["Products"],
                                summary: "List products",
                                description:
                                    "Paginated product list. Response uses `items` + `meta` (camelCase). Walk pages with `meta.hasNextPage` until false. Max 48 items per page (default **18**).",
                                operationId: "listProducts",
                                security: [],
                                parameters: [
                                    {
                                        name: "page",
                                        in: "query",
                                        description: "Page number (starts at 1)",
                                        schema: {
                                            type: "integer",
                                            default: 1,
                                            minimum: 1,
                                            example: 1,
                                        },
                                    },
                                    {
                                        name: "perPage",
                                        in: "query",
                                        description:
                                            "Page size. Integer from 1 to 48 inclusive. Default: 18.",
                                        schema: {
                                            type: "integer",
                                            default: 18,
                                            minimum: 1,
                                            maximum: 48,
                                            example: 18,
                                        },
                                    },
                                    {
                                        name: "collectionId",
                                        in: "query",
                                        description: "Filter by collection ID",
                                        schema: { type: "integer", minimum: 1 },
                                    },
                                    {
                                        name: "shopId",
                                        in: "query",
                                        description: "Filter by shop ID",
                                        schema: { type: "integer", minimum: 1 },
                                    },
                                    {
                                        name: "minPrice",
                                        in: "query",
                                        description:
                                            "Minimum price in **USD** (must be ≤ maxPrice when both are set)",
                                        schema: {
                                            type: "number",
                                            format: "float",
                                            minimum: 0,
                                            example: 10,
                                        },
                                    },
                                    {
                                        name: "maxPrice",
                                        in: "query",
                                        description:
                                            "Maximum price in **USD** (must be ≥ minPrice when both are set)",
                                        schema: {
                                            type: "number",
                                            format: "float",
                                            minimum: 0,
                                            example: 50,
                                        },
                                    },
                                    {
                                        name: "search",
                                        in: "query",
                                        description:
                                            "Search keyword (max 200 characters). Scope controlled by `searchScope`.",
                                        schema: {
                                            type: "string",
                                            maxLength: 200,
                                            example: "almond",
                                        },
                                    },
                                    {
                                        name: "searchScope",
                                        in: "query",
                                        description:
                                            "Where to apply `search`: `all` (default), `name`, `description`, or `shop` only",
                                        schema: {
                                            type: "string",
                                            enum: [
                                                "all",
                                                "name",
                                                "description",
                                                "shop",
                                            ],
                                            default: "all",
                                        },
                                    },
                                    {
                                        name: "sortBy",
                                        in: "query",
                                        description: "Sort order",
                                        schema: {
                                            type: "string",
                                            enum: [
                                                "newest",
                                                "price_asc",
                                                "price_desc",
                                                "name",
                                                "popular",
                                            ],
                                            default: "newest",
                                        },
                                    },
                                    {
                                        name: "inStock",
                                        in: "query",
                                        description:
                                            "Stock filter. Omit or `true`: in-stock sellable products only. `false`: include active products that may be out of stock.",
                                        schema: {
                                            type: "boolean",
                                            example: true,
                                        },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Success",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ProductListResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description:
                                            "Validation error (e.g. perPage > 48, minPrice > maxPrice)",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/product/{slug}": {
                            get: {
                                tags: ["Products"],
                                summary: "Product detail",
                                description:
                                    "Single product by URL slug or numeric ID. Only products that pass `availableForDisplay()`. `media` merges product uploads then template media (deduped by URL). Includes template **customizations** and product **special_shipping_handling** when enabled.",
                                operationId: "getProductBySlug",
                                security: [],
                                parameters: [
                                    {
                                        name: "slug",
                                        in: "path",
                                        required: true,
                                        description:
                                            "Product slug (e.g. `almond-nude-set`) or numeric ID",
                                        schema: {
                                            type: "string",
                                            example: "almond-nude-set",
                                        },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Product detail",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ProductDetailResponse",
                                                },
                                            },
                                        },
                                    },
                                    404: {
                                        description:
                                            "Product not found or not available for display",
                                    },
                                },
                            },
                        },
                        "/api/collections": {
                            get: {
                                tags: ["Collections"],
                                summary: "List collections",
                                description:
                                    "Active, admin-approved collections. Default `perPage` is **12**.",
                                operationId: "listCollections",
                                security: [],
                                parameters: [
                                    {
                                        name: "page",
                                        in: "query",
                                        schema: {
                                            type: "integer",
                                            default: 1,
                                            minimum: 1,
                                        },
                                    },
                                    {
                                        name: "perPage",
                                        in: "query",
                                        description: "1–48, default 12",
                                        schema: {
                                            type: "integer",
                                            default: 12,
                                            minimum: 1,
                                            maximum: 48,
                                        },
                                    },
                                    {
                                        name: "search",
                                        in: "query",
                                        description: "Search name or description",
                                        schema: {
                                            type: "string",
                                            maxLength: 200,
                                        },
                                    },
                                    {
                                        name: "sortBy",
                                        in: "query",
                                        schema: {
                                            type: "string",
                                            enum: [
                                                "featured",
                                                "name",
                                                "newest",
                                                "oldest",
                                                "products",
                                            ],
                                            default: "featured",
                                        },
                                    },
                                    {
                                        name: "shopId",
                                        in: "query",
                                        schema: { type: "integer", minimum: 1 },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Collection list",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CollectionListResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description: "Validation error",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/shops": {
                            get: {
                                tags: ["Shops"],
                                summary: "List shops",
                                description:
                                    "Active shops only. Default `perPage` is **24**, default `sortBy` is **name**.",
                                operationId: "listShops",
                                security: [],
                                parameters: [
                                    {
                                        name: "page",
                                        in: "query",
                                        schema: {
                                            type: "integer",
                                            default: 1,
                                            minimum: 1,
                                        },
                                    },
                                    {
                                        name: "perPage",
                                        in: "query",
                                        description: "1–48, default 24",
                                        schema: {
                                            type: "integer",
                                            default: 24,
                                            minimum: 1,
                                            maximum: 48,
                                        },
                                    },
                                    {
                                        name: "search",
                                        in: "query",
                                        description: "Search shop name or description",
                                        schema: {
                                            type: "string",
                                            maxLength: 200,
                                        },
                                    },
                                    {
                                        name: "sortBy",
                                        in: "query",
                                        schema: {
                                            type: "string",
                                            enum: [
                                                "name",
                                                "newest",
                                                "rating",
                                                "products",
                                            ],
                                            default: "name",
                                        },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Shop list",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ShopListResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description: "Validation error",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                        },
                        "/api/cart": {
                            get: {
                                tags: ["Cart"],
                                summary: "Get cart",
                                operationId: "getCart",
                                security: [],
                                parameters: [
                                    {
                                        name: "country",
                                        in: "query",
                                        description:
                                            "Shipping destination country code for estimate",
                                        schema: {
                                            type: "string",
                                            example: "US",
                                        },
                                    },
                                ],
                                responses: {
                                    200: {
                                        description: "Cart with totals and summary",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CartGetResponse",
                                                },
                                                example: {
                                                    cart_items: [
                                                        {
                                                            id: 42,
                                                            product_id: 10,
                                                            variant_id: 5,
                                                            quantity: 1,
                                                            price: 24.99,
                                                            line_total: 24.99,
                                                            selected_variant: {
                                                                id: 5,
                                                                attributes: { Size: "M" },
                                                            },
                                                            customizations: {},
                                                            product: {
                                                                id: 10,
                                                                name: "Classic Set",
                                                                slug: "classic-set",
                                                                url: "/products/classic-set",
                                                                primary_image: "https://example.com/img.webp",
                                                                primary_image_alt: "Classic Set",
                                                                is_gift_card: false,
                                                                requires_special_handling: false,
                                                                shop: null,
                                                            },
                                                        },
                                                    ],
                                                    total_items: 1,
                                                    total_price: 24.99,
                                                    summary: {
                                                        subtotal: 24.99,
                                                        shipping: 5.99,
                                                        discount: 0,
                                                        gift_card_discount: 0,
                                                        total: 30.98,
                                                    },
                                                    shipping_details: {
                                                        zone_id: 1,
                                                        zone_name: "United States",
                                                        country: "US",
                                                        total_shipping: 5.99,
                                                        breakdown: { currency: "USD" },
                                                    },
                                                    currency: "USD",
                                                    currency_rate: 1,
                                                },
                                            },
                                        },
                                    },
                                    500: {
                                        description: "Server error",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CartApiErrorResponse",
                                                },
                                            },
                                        },
                                    },
                                },
                            },
                            post: {
                                tags: ["Cart"],
                                summary: "Add to cart",
                                operationId: "addToCart",
                                security: [],
                                requestBody: {
                                    required: true,
                                    content: {
                                        "application/json": {
                                            schema: {
                                                $ref: "#/components/schemas/CartAddRequest",
                                            },
                                        },
                                    },
                                },
                                responses: {
                                    200: {
                                        description: "Item added",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CartAddResponse",
                                                },
                                            },
                                        },
                                    },
                                    422: {
                                        description: "Validation error",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                    500: {
                                        description: "Server error",
                                    },
                                },
                            },
                            delete: {
                                tags: ["Cart"],
                                summary: "Clear cart",
                                operationId: "clearCart",
                                security: [],
                                responses: {
                                    200: {
                                        description: "Cart cleared",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CartMessageResponse",
                                                },
                                            },
                                        },
                                    },
                                    500: {
                                        description: "Server error",
                                    },
                                },
                            },
                        },
                        "/api/cart/{item_id}": {
                            put: {
                                tags: ["Cart"],
                                summary: "Update cart line",
                                operationId: "updateCartItem",
                                security: [],
                                parameters: [
                                    {
                                        name: "item_id",
                                        in: "path",
                                        required: true,
                                        description: "Cart row ID (`carts.id`)",
                                        schema: {
                                            type: "integer",
                                            minimum: 1,
                                            example: 42,
                                        },
                                    },
                                ],
                                requestBody: {
                                    required: true,
                                    content: {
                                        "application/json": {
                                            schema: {
                                                $ref: "#/components/schemas/CartUpdateRequest",
                                            },
                                        },
                                    },
                                },
                                responses: {
                                    200: {
                                        description: "Line updated",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/CartUpdateResponse",
                                                },
                                            },
                                        },
                                    },
                                    404: {
                                        description:
                                            "Cart line not found for this session/user",
                                    },
                                    422: {
                                        description: "Validation error",
                                        content: {
                                            "application/json": {
                                                schema: {
                                                    $ref: "#/components/schemas/ValidationError",
                                                },
                                            },
                                        },
                                    },
                                    500: {
                                        description: "Server error",
                                    },
                                },
                            },
                            delete: {
                                tags: ["Cart"],
                                summary: "Remove cart line",
                                operationId: "removeCartItem",
                                security: [],
