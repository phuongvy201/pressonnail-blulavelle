# Chèn vào khối server { } (Laravel + Nginx). Đặt các location này TRƯỚC location ~ \.php$ nếu có thể.
# Kiểm tra: curl -sI https://domain/storage/xxx.jpg | grep -i cache

# Vite (hash trong tên) + manifest
location ~* ^/build/assets/.+\.(?:js|css)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location = /build/manifest.json {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
}

# Ảnh, video, font, JS/CSS còn lại (storage, images, js, …)
location ~* \.(?:avif|webp|jpe?g|png|gif|svg|ico|mp4|webm|woff2?|ttf|otf|eot|css|js|mjs)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000" always;
    try_files $uri =404;
}
